<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <meta name="theme-color" content="#1890ff" />
        <title>Đang ngoại tuyến | Hải Đăng</title>
        <style>
            :root {
                color-scheme: light;
                font-family:
                    Inter,
                    -apple-system,
                    BlinkMacSystemFont,
                    'Segoe UI',
                    sans-serif;
                color: #162033;
                background: #f5f7fb;
            }

            * {
                box-sizing: border-box;
            }

            body {
                min-height: 100vh;
                margin: 0;
                display: grid;
                place-items: center;
                padding: max(24px, env(safe-area-inset-top)) 20px max(24px, env(safe-area-inset-bottom));
                background:
                    radial-gradient(circle at 15% 10%, rgba(24, 144, 255, 0.16), transparent 30%),
                    linear-gradient(180deg, #f8fbff 0%, #eef3fb 100%);
            }

            main {
                width: min(420px, 100%);
                padding: 28px;
                border: 1px solid rgba(15, 23, 42, 0.08);
                border-radius: 24px;
                background: rgba(255, 255, 255, 0.92);
                box-shadow: 0 18px 42px rgba(15, 23, 42, 0.08);
            }

            img {
                width: 64px;
                height: 64px;
                border-radius: 18px;
            }

            h1 {
                margin: 18px 0 10px;
                font-size: 24px;
                line-height: 1.2;
            }

            p {
                margin: 0;
                color: #66758f;
                font-size: 15px;
                line-height: 1.65;
            }

            button {
                width: 100%;
                min-height: 44px;
                margin-top: 22px;
                border: 0;
                border-radius: 14px;
                background: #1890ff;
                color: #fff;
                font: inherit;
                font-weight: 700;
            }
        </style>
    </head>
    <body>
        <main>
            <img src="/icons/icon-192.png" alt="" />
            <h1>Không có kết nối mạng</h1>
            <p>
                Ứng dụng Hải Đăng vẫn mở được ở chế độ PWA. Một số dữ liệu máy móc, vật tư và thông báo sẽ
                được cập nhật lại khi thiết bị có mạng.
            </p>
            <button type="button" onclick="window.location.reload()">Thử tải lại</button>
        </main>
    </body>
</html>
